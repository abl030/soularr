[Slskd]
api_key = yourslskdapikeygoeshere
host_url = http://localhost:5030
url_base = /
download_dir = /path/to/slskd/downloads
delete_searches = False
stalled_timeout = 7200
remote_queue_timeout = 3600

[Release Settings]
use_most_common_tracknum = True
allow_multi_disc = True
accepted_countries = Europe,Japan,United Kingdom,United States,[Worldwide],Australia,Canada
skip_region_check = False
accepted_formats = CD,Digital Media,Vinyl

[Search Settings]
search_timeout = 30000
maximum_peer_queue = 50
minimum_peer_upload_speed = 0
minimum_filename_match_ratio = 0.8
allowed_filetypes = flac 24/192,flac 16/44.1,flac,mp3 320,mp3
ignored_users = User1,User2
search_for_tracks = True
album_prepend_artist = False
track_prepend_artist = True
search_type = incrementing_page
number_of_albums_to_grab = 10
title_blacklist = BlacklistWord1,blacklistword2
search_blacklist = WordToStripFromSearch1,WordToStripFromSearch2
parallel_searches = 8
enable_search_denylist = False
max_search_failures = 3

[Download Settings]
download_filtering = True
use_extension_whitelist = False
extensions_whitelist = lrc,nfo,txt

[Beets Validation]
enabled = False
harness_path = /path/to/run_beets_harness.sh
distance_threshold = 0.15
staging_dir = /path/to/staging
tracking_file = /path/to/beets-validated.jsonl

[Pipeline DB]
enabled = False
dsn = postgresql://soularr:soularr@localhost:5432/soularr

[Logging]
level = INFO
# https://docs.python.org/3/library/logging.html#logrecord-attributes
format = [%(levelname)s|%(module)s|L%(lineno)d] %(asctime)s: %(message)s
# https://docs.python.org/3/library/time.html#time.strftime
datefmt = %Y-%m-%dT%H:%M:%S%z
