<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Music Pipeline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #111; color: #eee; padding: 16px; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.4em; margin-bottom: 16px; color: #aaa; }
  input[type=text] { width: 100%; padding: 12px; font-size: 16px; background: #222; color: #eee; border: 1px solid #444; border-radius: 8px; margin-bottom: 16px; }
  input[type=text]:focus { outline: none; border-color: #6a9; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { padding: 8px 16px; background: #222; border: 1px solid #333; border-radius: 6px; cursor: pointer; color: #aaa; font-size: 14px; }
  .tab.active { background: #2a3a2a; border-color: #6a9; color: #6a9; }
  .section { display: none; }
  .section.active { display: block; }
  .artist { padding: 12px; background: #1a1a1a; border-radius: 8px; margin-bottom: 8px; }
  .artist-header { cursor: pointer; }
  .artist-header:hover { opacity: 0.8; }
  .artist-name { font-weight: 600; }
  .artist-dis { color: #777; font-size: 0.85em; }
  .rg-list { padding-left: 0; margin-top: 8px; }
  .library-section { background: #1a1a2a; border-radius: 8px; padding: 10px; margin-bottom: 12px; }
  .library-header { color: #6af; font-size: 0.8em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .library-album { padding: 6px 10px; background: #222233; border-radius: 4px; margin-bottom: 3px; font-size: 0.85em; display: flex; justify-content: space-between; }
  .library-album-title { flex: 1; }
  .library-album-meta { color: #666; font-size: 0.8em; }
  .library-src { font-size: 0.7em; padding: 1px 6px; border-radius: 3px; }
  .library-src-mb { background: #1a3a2a; color: #6d6; }
  .library-src-discogs { background: #3a2a1a; color: #da6; }
  .type-section { margin-bottom: 12px; }
  .type-header { padding: 6px 10px; color: #6a9; font-size: 0.8em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .type-header:hover { color: #8cb; }
  .type-count { color: #555; font-weight: 400; }
  .type-body { display: none; }
  .type-body.open { display: block; }
  .rg { padding: 10px 12px; background: #1e1e1e; border-left: 3px solid #444; margin-bottom: 4px; cursor: pointer; border-radius: 0 6px 6px 0; }
  .rg:hover { background: #252525; }
  .rg-title { font-weight: 500; }
  .rg-year { color: #777; font-size: 0.85em; }
  .rg-meta { color: #777; font-size: 0.8em; }
  .releases { margin-top: 6px; padding-left: 12px; }
  .release { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #222; border-radius: 6px; margin-bottom: 0; cursor: pointer; }
  .release:hover { background: #2a2a2a; }
  .release-info { flex: 1; }
  .release-title { font-size: 0.9em; }
  .release-meta { color: #777; font-size: 0.75em; }
  .release-detail { background: #1a1a1a; padding: 10px 12px; margin: 0 0 4px 0; border-radius: 0 0 6px 6px; display: none; font-size: 0.85em; }
  .release-detail.open { display: block; }
  .release-detail .lib-track { font-size: 0.85em; color: #888; padding: 1px 0; display: flex; justify-content: space-between; }
  .release-detail .lib-track-meta { color: #555; }
  .release-detail .release-links { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-add { background: #2a5a2a; color: #8d8; }
  .btn-add:hover { background: #3a6a3a; }
  .btn-add:disabled { background: #333; color: #666; cursor: default; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; font-weight: 600; margin-left: 6px; }
  .badge-new { background: #1a4a2a; color: #6d6; }
  .badge-upgraded { background: #1a4a2a; color: #6d6; }
  .badge-rejected { background: #4a1a1a; color: #d66; }
  .badge-transcode { background: #3a3a1a; color: #da6; }
  .badge-force { background: #1a2a4a; color: #6af; }
  .badge-failed { background: #4a1a1a; color: #d66; }
  .badge-library { background: #1a3a5a; color: #6af; }
  .badge-wanted { background: #5a3a1a; color: #fa6; }
  .badge-downloading { background: #1a3a5a; color: #6cf; }
  .badge-imported { background: #1a4a2a; color: #6d6; }
  .badge-manual { background: #3a3a3a; color: #aaa; }
  .status-card { background: #1a1a1a; padding: 16px; border-radius: 8px; margin-bottom: 12px; }
  .status-counts { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .count { text-align: center; padding: 8px 16px; background: #222; border-radius: 6px; cursor: pointer; border: 1px solid #333; flex: 1; min-width: 80px; }
  .count.active { border-color: #6a9; background: #2a3a2a; }
  .count-num { font-size: 1.8em; font-weight: 700; }
  .count-label { font-size: 0.8em; color: #777; }
  .p-item { padding: 10px 12px; background: #1e1e1e; border-left: 3px solid #444; margin-bottom: 4px; border-radius: 0 6px 6px 0; cursor: pointer; }
  .p-item:hover { background: #252525; }
  .p-item.src-request { border-left-color: #6a9; }
  .p-item.src-redownload { border-left-color: #a96; }
  .p-item.src-manual { border-left-color: #96a; }
  .p-top { display: flex; justify-content: space-between; align-items: center; }
  .p-title { font-weight: 500; font-size: 0.95em; }
  .p-artist { color: #999; font-size: 0.85em; }
  .p-meta { color: #666; font-size: 0.75em; margin-top: 3px; display: flex; gap: 12px; flex-wrap: wrap; }
  .p-detail { background: #191919; padding: 10px 12px; margin: 0 0 4px 0; border-radius: 0 0 6px 6px; display: none; border-left: 3px solid #333; }
  .p-detail.open { display: block; }
  .p-detail-row { display: flex; gap: 8px; margin-bottom: 4px; font-size: 0.8em; }
  .p-detail-label { color: #666; min-width: 80px; }
  .p-detail-value { color: #bbb; }
  .p-tracks { margin-top: 8px; }
  .p-track { font-size: 0.78em; color: #888; padding: 1px 0; }
  .p-history { margin-top: 8px; }
  .p-hist-item { font-size: 0.75em; color: #777; padding: 6px 0; border-bottom: 1px solid #222; }
  .p-hist-header { display: flex; gap: 8px; align-items: center; margin-bottom: 3px; }
  .p-hist-row { color: #888; padding: 1px 0 1px 8px; font-size: 0.95em; }
  .p-hist-label { color: #666; display: inline-block; min-width: 80px; }
  .p-hist-verdict { color: #bbb; padding: 2px 0 0 8px; font-size: 0.95em; }
  .p-actions { display: flex; gap: 6px; margin-top: 8px; }
  .p-btn { padding: 4px 12px; border: 1px solid #444; background: #222; color: #aaa; border-radius: 4px; cursor: pointer; font-size: 0.78em; }
  .p-btn:hover { background: #333; color: #eee; }
  .p-btn.active-status { border-color: #6a9; color: #6a9; background: #2a3a2a; }
  .p-btn.delete { border-color: #633; color: #d66; margin-left: auto; }
  .p-btn.delete:hover { background: #3a1a1a; }
  .p-group-header { padding: 8px 12px; color: #6a9; font-size: 0.85em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 12px; margin-bottom: 4px; display: flex; justify-content: space-between; cursor: pointer; }
  .p-group-header:hover { color: #8cb; }
  .p-group-body { }
  .p-group-body.collapsed { display: none; }
  .r-item { padding: 10px 12px; background: #1e1e1e; border-left: 3px solid #1a4a2a; margin-bottom: 4px; border-radius: 0 6px 6px 0; cursor: pointer; }
  .r-item:hover { background: #252525; }
  .r-item.beets-missing { border-left-color: #a33; }
  .r-item.beets-mismatch { border-left-color: #a93; }
  .beets-status { font-size: 0.7em; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
  .beets-ok { background: #1a3a2a; color: #6d6; }
  .beets-missing { background: #3a1a1a; color: #d66; }
  .beets-mismatch { background: #3a2a1a; color: #da6; }
  .r-date-header { padding: 6px 12px; color: #6a9; font-size: 0.8em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 12px; margin-bottom: 4px; }
  .lib-artist { margin-bottom: 12px; }
  .lib-artist-header { padding: 10px 12px; background: #1a1a2a; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .lib-artist-header:hover { background: #222238; }
  .lib-artist-name { font-weight: 600; color: #8af; }
  .lib-artist-count { color: #556; font-size: 0.8em; }
  .lib-artist-body { display: none; padding-top: 4px; }
  .lib-artist-body.open { display: block; }
  .lib-rg { margin-bottom: 4px; }
  .lib-rg-header { padding: 8px 12px; background: #1e1e2e; border-left: 3px solid #446; border-radius: 0 6px 6px 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; }
  .lib-rg-header:hover { background: #252535; }
  .lib-rg-body { padding-left: 12px; display: none; }
  .lib-rg-body.open { display: block; }
  .lib-type-header { padding: 4px 12px; color: #6a9; font-size: 0.75em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; }
  .lib-item { padding: 10px 12px; background: #1e1e1e; border-left: 3px solid #336; margin-bottom: 4px; border-radius: 0 6px 6px 0; cursor: pointer; }
  .lib-item:hover { background: #252525; }
  .lib-detail { background: #191919; padding: 10px 12px; margin: 0 0 4px 0; border-radius: 0 0 6px 6px; display: none; border-left: 3px solid #333; }
  .lib-detail.open { display: block; }
  .lib-track { font-size: 0.78em; color: #888; padding: 1px 0; display: flex; justify-content: space-between; }
  .lib-track-meta { color: #555; }
  .p-btn.upgrade-btn { border-color: #5a5a1a; color: #da6; }
  .p-btn.upgrade-btn:hover { background: #3a3a1a; }
  .p-btn.delete-beets { border-color: #833; color: #f66; background: #2a1111; }
  .p-btn.delete-beets:hover { background: #3a1a1a; }
  .confirm-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .confirm-box { background: #222; border: 1px solid #633; border-radius: 8px; padding: 20px; max-width: 400px; text-align: center; }
  .confirm-box h3 { color: #f66; margin-bottom: 12px; }
  .confirm-box p { color: #aaa; margin-bottom: 16px; font-size: 0.9em; }
  .confirm-box .actions { display: flex; gap: 8px; justify-content: center; }
  .loading { color: #666; padding: 20px; text-align: center; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; background: #2a5a2a; color: #8d8; border-radius: 8px; font-size: 14px; z-index: 100; display: none; }
  .toast.error { background: #5a2a2a; color: #d88; }

  /* Decision diagram + simulator */
  .ds { font-size: 13px; }
  .ds-title { font-size: 1.1em; color: #aaa; margin-bottom: 12px; font-weight: 600; }
  .dp-stage { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 10px 12px; margin-bottom: 4px; }
  .dp-stage-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .dp-stage-title { font-weight: 600; font-size: 0.9em; }
  .dp-stage-fn { color: #555; font-size: 0.75em; font-family: monospace; }
  .dp-stage-when { color: #666; font-size: 0.8em; margin-bottom: 6px; }
  .dp-rule { display: flex; gap: 8px; padding: 3px 0; font-size: 0.85em; align-items: baseline; }
  .dp-rule-cond { color: #999; flex: 1; }
  .dp-rule-result { font-weight: 500; white-space: nowrap; }
  .dp-rule-effect { color: #666; font-size: 0.8em; font-style: italic; }
  .dp-note { color: #665; font-size: 0.8em; margin-top: 4px; padding-top: 4px; border-top: 1px solid #252525; }
  .dp-arrow { text-align: center; color: #444; padding: 2px 0; font-size: 14px; }
  .dp-out-green { color: #6d6; }
  .dp-out-amber { color: #da6; }
  .dp-out-red { color: #d66; }
  .dp-policy { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .dp-policy-badge { display: inline-flex; flex-direction: column; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 4px 10px; line-height: 1.25; }
  .dp-policy-badge-label { color: #888; font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.5px; }
  .dp-policy-badge-value { color: #6a9; font-size: 0.9em; font-weight: 600; font-family: monospace; }
  .dp-section-title { color: #6a9; font-size: 0.8em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
  .ds-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .ds-field { display: flex; flex-direction: column; gap: 2px; }
  .ds-field label { font-size: 0.8em; color: #888; }
  .ds-field select, .ds-field input { background: #222; color: #eee; border: 1px solid #444; border-radius: 4px; padding: 6px 8px; font-size: 13px; }
  .ds-field select:focus, .ds-field input:focus { outline: none; border-color: #6a9; }
  .ds-run { grid-column: 1 / -1; }
  .ds-run button { width: 100%; padding: 10px; background: #2a3a2a; color: #6a9; border: 1px solid #6a9; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
  .ds-run button:hover { background: #3a4a3a; }
  .ds-results { margin-top: 8px; }
  .ds-stage { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; }
  .ds-stage-title { font-weight: 600; font-size: 0.85em; color: #888; margin-bottom: 4px; }
  .ds-stage-value { font-size: 0.95em; font-weight: 500; }
  .ds-outcome { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 0.9em; font-weight: 500; }
  .ds-green { background: #1a3a1a; color: #6d6; }
  .ds-amber { background: #3a3a1a; color: #da6; }
  .ds-red { background: #3a1a1a; color: #d66; }
  .ds-skip { color: #555; font-style: italic; }
  .ds-summary { background: #1a1a2a; border: 1px solid #335; border-radius: 6px; padding: 12px; margin-top: 12px; }
  .ds-summary-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .ds-summary-label { color: #888; }
  .ds-presets { margin-bottom: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .ds-preset { padding: 4px 10px; background: #222; border: 1px solid #444; border-radius: 4px; cursor: pointer; color: #aaa; font-size: 0.8em; }
  .ds-preset:hover { border-color: #6a9; color: #6a9; }
</style>
</head>
<body>
<h1>Music Pipeline</h1>
<div class="tabs">
  <div class="tab active" onclick="showTab('browse')">Browse</div>
  <div class="tab" onclick="showTab('recents')">Recents</div>
  <div class="tab" onclick="showTab('pipeline')">Pipeline</div>
  <div class="tab" onclick="showTab('decisions')">Decisions</div>
  <div class="tab" onclick="showTab('manual')">Manual Import</div>
</div>

<div id="browse-section" class="section active">
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
    <input type="text" id="q" placeholder="Search artists or albums..." autofocus style="flex:1;">
    <div style="display:flex;gap:2px;">
      <button class="p-btn active-status" id="search-type-artist" onclick="setSearchType('artist')">Artist</button>
      <button class="p-btn" id="search-type-release" onclick="setSearchType('release')">Album</button>
    </div>
  </div>
  <div id="results"></div>
  <div id="browse-artist" style="display:none;">
    <div id="browse-artist-header" style="margin:12px 0 8px;display:flex;align-items:center;gap:12px;">
      <span style="cursor:pointer;font-size:18px;" onclick="closeBrowseArtist()">←</span>
      <span id="browse-artist-name" style="font-size:18px;font-weight:bold;"></span>
    </div>
    <div class="browse-subnav" style="display:flex;gap:2px;margin-bottom:12px;">
      <button class="p-btn active-status" id="subnav-discography" onclick="switchSubView('discography')">Discography</button>
      <button class="p-btn" id="subnav-analysis" onclick="switchSubView('analysis')">Analysis</button>
      <button class="p-btn" id="subnav-library" onclick="switchSubView('library')">Library</button>
    </div>
    <div id="browse-discography"></div>
    <div id="browse-analysis" style="display:none;"></div>
    <div id="browse-library" style="display:none;"></div>
  </div>
</div>

<div id="recents-section" class="section">
  <div id="recents-content" class="loading">Loading...</div>
</div>

<div id="pipeline-section" class="section">
  <div id="pipeline-content" class="loading">Loading...</div>
</div>


<div id="decisions-section" class="section">
  <div id="decisions-content" class="loading">Loading...</div>
</div>

<div id="manual-section" class="section">
  <div style="display:flex;gap:2px;margin-bottom:12px;">
    <button class="p-btn active-status" id="manual-sub-complete" onclick="showManualSub('complete')">Complete</button>
    <button class="p-btn" id="manual-sub-wrong" onclick="showManualSub('wrong')">Wrong Matches</button>
  </div>
  <div id="manual-complete"><div id="manual-content" class="loading">Loading...</div></div>
  <div id="manual-wrong" style="display:none;"><div id="wrong-matches-content" class="loading"></div></div>
</div>


<div class="toast" id="toast"></div>

<script type="module" src="/js/main.js"></script>
</body>
</html>
