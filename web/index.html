<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Music Pipeline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #111; color: #eee; padding: 16px; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.4em; margin-bottom: 16px; color: #aaa; }
  input[type=text] { width: 100%; padding: 12px; font-size: 16px; background: #222; color: #eee; border: 1px solid #444; border-radius: 8px; margin-bottom: 16px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { padding: 8px 16px; background: #222; border: 1px solid #333; border-radius: 6px; cursor: pointer; color: #aaa; font-size: 14px; }
  .tab.active { background: #2a3a2a; border-color: #6a9; color: #6a9; }

  .artist-header { cursor: pointer; }
  .artist-header:hover { opacity: 0.8; }
  .artist-name { font-weight: 600; }
  .artist-dis { color: #777; font-size: 0.85em; }
  .rg-list { padding-left: 0; margin-top: 8px; }
  .library-section { background: #1a1a2a; border-radius: 8px; padding: 10px; margin-bottom: 12px; }
  .library-header { color: #6af; font-size: 0.8em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .library-album { padding: 6px 10px; background: #222233; border-radius: 4px; margin-bottom: 3px; font-size: 0.85em; display: flex; justify-content: space-between; }
  .library-album-title { flex: 1; }
  .library-album-meta { color: #666; font-size: 0.8em; }
  .library-src { font-size: 0.7em; padding: 1px 6px; border-radius: 3px; }
  .library-src-mb { background: #1a3a2a; color: #6d6; }
  .library-src-discogs { background: #3a2a1a; color: #da6; }
  .type-section { margin-bottom: 12px; }
  .type-header { padding: 6px 10px; color: #6a9; font-size: 0.8em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }

  .type-count { color: #555; font-weight: 400; }

  .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-add { background: #2a5a2a; color: #8d8; }
  .btn-add:hover { background: #3a6a3a; }
  .btn-add:disabled { background: #333; color: #666; cursor: default; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; font-weight: 600; margin-left: 6px; }
  .badge-new { background: #1a4a2a; color: #6d6; }
  .badge-upgraded { background: #1a4a2a; color: #6d6; }
  .badge-rejected { background: #4a1a1a; color: #d66; }
  .badge-transcode { background: #3a3a1a; color: #da6; }
  .badge-library { background: #1a3a5a; color: #6af; }
  .badge-wanted { background: #5a3a1a; color: #fa6; }
  .badge-imported { background: #1a4a2a; color: #6d6; }
  .badge-manual { background: #3a3a3a; color: #aaa; }
  .status-card { background: #1a1a1a; padding: 16px; border-radius: 8px; margin-bottom: 12px; }
  .status-counts { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .count { text-align: center; padding: 8px 16px; background: #222; border-radius: 6px; cursor: pointer; border: 1px solid #333; flex: 1; min-width: 80px; }
  .count.active { border-color: #6a9; background: #2a3a2a; }
  .count-num { font-size: 1.8em; font-weight: 700; }
  .count-label { font-size: 0.8em; color: #777; }
  .p-item { padding: 10px 12px; background: #1e1e1e; border-left: 3px solid #444; margin-bottom: 4px; border-radius: 0 6px 6px 0; cursor: pointer; }
  .p-item:hover { background: #252525; }
  .p-item.src-request { border-left-color: #6a9; }
  .p-item.src-redownload { border-left-color: #a96; }
  .p-item.src-manual { border-left-color: #96a; }
  .p-top { display: flex; justify-content: space-between; align-items: center; }
  .p-title { font-weight: 500; font-size: 0.95em; }
  .p-artist { color: #999; font-size: 0.85em; }
  .p-meta { color: #666; font-size: 0.75em; margin-top: 3px; display: flex; gap: 12px; flex-wrap: wrap; }
  .p-detail { background: #191919; padding: 10px 12px; margin: 0 0 4px 0; border-radius: 0 0 6px 6px; display: none; border-left: 3px solid #333; }
  .p-detail.open { display: block; }
  .p-detail-row { display: flex; gap: 8px; margin-bottom: 4px; font-size: 0.8em; }
  .p-detail-label { color: #666; min-width: 80px; }
  .p-detail-value { color: #bbb; }
  .p-tracks { margin-top: 8px; }
  .p-track { font-size: 0.78em; color: #888; padding: 1px 0; }
  .p-history { margin-top: 8px; }
  .p-hist-item { font-size: 0.75em; color: #777; padding: 3px 0; border-bottom: 1px solid #222; }
  .p-actions { display: flex; gap: 6px; margin-top: 8px; }
  .p-btn { padding: 4px 12px; border: 1px solid #444; background: #222; color: #aaa; border-radius: 4px; cursor: pointer; font-size: 0.78em; }
  .p-btn:hover { background: #333; color: #eee; }
  .p-btn.active-status { border-color: #6a9; color: #6a9; background: #2a3a2a; }
  .p-btn.delete { border-color: #633; color: #d66; margin-left: auto; }
  .p-btn.delete:hover { background: #3a1a1a; }
  .p-group-header { padding: 8px 12px; color: #6a9; font-size: 0.85em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 12px; margin-bottom: 4px; display: flex; justify-content: space-between; cursor: pointer; }
  .p-group-header:hover { color: #8cb; }
  .p-group-body { }
  .p-group-body.collapsed { display: none; }
  .r-item { padding: 10px 12px; background: #1e1e1e; border-left: 3px solid #1a4a2a; margin-bottom: 4px; border-radius: 0 6px 6px 0; cursor: pointer; }
  .r-item:hover { background: #252525; }
  .r-item.beets-missing { border-left-color: #a33; }
  .r-item.beets-mismatch { border-left-color: #a93; }
  .beets-status { font-size: 0.7em; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
  .beets-ok { background: #1a3a2a; color: #6d6; }
  .beets-missing { background: #3a1a1a; color: #d66; }
  .beets-mismatch { background: #3a2a1a; color: #da6; }
  .r-date-header { padding: 6px 12px; color: #6a9; font-size: 0.8em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 12px; margin-bottom: 4px; }
  .lib-artist { margin-bottom: 12px; }
  .lib-artist-header { padding: 10px 12px; background: #1a1a2a; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .lib-artist-header:hover { background: #222238; }
  .lib-artist-name { font-weight: 600; color: #8af; }
  .lib-artist-count { color: #556; font-size: 0.8em; }
  .lib-artist-body { display: none; padding-top: 4px; }
  .lib-artist-body.open { display: block; }
  .lib-rg { margin-bottom: 4px; }
  .lib-rg-header { padding: 8px 12px; background: #1e1e2e; border-left: 3px solid #446; border-radius: 0 6px 6px 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; }
  .lib-rg-header:hover { background: #252535; }
  .lib-rg-body { padding-left: 12px; display: none; }
  .lib-rg-body.open { display: block; }
  .lib-type-header { padding: 4px 12px; color: #6a9; font-size: 0.75em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; }
  .lib-item { padding: 10px 12px; background: #1e1e1e; border-left: 3px solid #336; margin-bottom: 4px; border-radius: 0 6px 6px 0; cursor: pointer; }
  .lib-item:hover { background: #252525; }
  .lib-detail { background: #191919; padding: 10px 12px; margin: 0 0 4px 0; border-radius: 0 0 6px 6px; display: none; border-left: 3px solid #333; }
  .lib-detail.open { display: block; }
  .lib-track { font-size: 0.78em; color: #888; padding: 1px 0; display: flex; justify-content: space-between; }
  .lib-track-meta { color: #555; }
  .p-btn.upgrade-btn { border-color: #5a5a1a; color: #da6; }
  .p-btn.upgrade-btn:hover { background: #3a3a1a; }
  .p-btn.delete-beets { border-color: #833; color: #f66; background: #2a1111; }
  .p-btn.delete-beets:hover { background: #3a1a1a; }
  .confirm-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .confirm-box { background: #222; border: 1px solid #633; border-radius: 8px; padding: 20px; max-width: 400px; text-align: center; }
  .confirm-box h3 { color: #f66; margin-bottom: 12px; }
  .confirm-box p { color: #aaa; margin-bottom: 16px; font-size: 0.9em; }
  .confirm-box .actions { display: flex; gap: 8px; justify-content: center; }
  .loading { color: #666; padding: 20px; text-align: center; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; background: #2a5a2a; color: #8d8; border-radius: 8px; font-size: 14px; z-index: 100; display: none; }
  .toast.error { background: #5a2a2a; color: #d88; }
</style>
</head>
<body>
<h1>Music Pipeline</h1>
<div class="tabs">
  <div class="tab active" onclick="showTab('search')">Search</div>
  <div class="tab" onclick="showTab('recents')">Recents</div>
  <div class="tab" onclick="showTab('pipeline')">Pipeline</div>
  <div class="tab" onclick="showTab('library')">Library</div>
</div>

<div id="search-section" class="section active">
  <input type="text" id="q" placeholder="Search artists..." autofocus>
  <div id="results"></div>
</div>

<div id="recents-section" class="section">
  <div id="recents-content" class="loading">Loading...</div>
</div>

<div id="pipeline-section" class="section">
  <div id="pipeline-content" class="loading">Loading...</div>
</div>

<div id="library-section" class="section">
  <input type="text" id="lib-q" placeholder="Search beets library...">
  <div id="library-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let searchTimer = null;

function qualityLabel(formats, minBitrate) {
  // minBitrate is in bps from beets (e.g. 320000)
  if (!formats) return '?';
  const fmt = formats.split(',')[0].trim().toUpperCase();
  if (fmt === 'FLAC' || fmt === 'ALAC') return fmt;
  if (!minBitrate || minBitrate <= 0) return fmt;
  const kbps = Math.round(minBitrate / 1000);
  if (kbps >= 295) return fmt + ' 320';
  if (kbps >= 220) return fmt + ' V0';
  if (kbps >= 170) return fmt + ' V2';
  return fmt + ' ' + kbps + 'k';
}

function renderDownloadHistoryItem(h) {
  const outcome = h.outcome || '?';
  const color = outcome === 'success' ? '#6d6' : outcome === 'rejected' ? '#d88' : '#aa8';
  const user = h.soulseek_username || '?';
  const date = awstDateTime(h.created_at || '');
  const dist = h.beets_distance != null ? ` dist=${parseFloat(h.beets_distance).toFixed(3)}` : '';
  const err = h.error_message ? ` - ${h.error_message}` : '';
  const scenario = h.beets_scenario ? ` [${h.beets_scenario}]` : '';

  // Line 1: outcome, user, date
  let line1 = `<span style="color:${color};">${outcome}</span> ${user} ${date}${dist}${scenario}${err}`;

  // Line 2: quality flow — slskd reported → actual on disk → spectral analysis → existing
  let qualityParts = [];

  // What Soulseek said
  const slskdFmt = h.slskd_filetype || h.original_filetype || h.filetype || '';
  if (slskdFmt) {
    const slskdBr = h.slskd_bitrate ? qualityLabel(slskdFmt, h.slskd_bitrate) : slskdFmt;
    qualityParts.push(`slskd: ${slskdBr}`);
  }

  // What's actually on disk
  const actualFmt = h.actual_filetype || h.filetype || '';
  if (actualFmt) {
    let actualLabel;
    if (h.was_converted) {
      const convBr = h.bitrate || h.actual_min_bitrate || 0;
      actualLabel = convBr ? qualityLabel('mp3', convBr) + ' (from ' + (h.original_filetype || '?') + ')' : 'MP3 (from ' + (h.original_filetype || '?') + ')';
    } else {
      const br = h.actual_min_bitrate || h.bitrate || 0;
      actualLabel = br ? qualityLabel(actualFmt, br) : actualFmt;
    }
    qualityParts.push(`actual: ${actualLabel}`);
  }

  // Spectral analysis verdict
  if (h.spectral_grade) {
    const sgColor = h.spectral_grade === 'genuine' ? '#6d6' : h.spectral_grade === 'suspect' ? '#d66' : '#aa8';
    const sgLabel = h.spectral_bitrate ? `${h.spectral_grade} (~${h.spectral_bitrate}kbps)` : h.spectral_grade;
    qualityParts.push(`<span style="color:${sgColor};">spectral: ${sgLabel}</span>`);
  }

  // What was on disk before this download
  if (h.existing_min_bitrate || h.existing_spectral_bitrate) {
    const eBr = h.existing_spectral_bitrate || h.existing_min_bitrate;
    qualityParts.push(`<span style="color:#888;">was: ${eBr}kbps</span>`);
  }

  let line2 = qualityParts.length ? `<div style="color:#999;font-size:0.85em;padding-left:8px;">${qualityParts.join(' → ')}</div>` : '';

  const detail = h.beets_detail && h.beets_detail !== `distance=${h.beets_distance}` ? `<div style="color:#666;font-size:0.9em;padding-left:8px;">${esc(h.beets_detail)}</div>` : '';
  return `<div class="p-hist-item">${line1}${line2}</div>${detail}`;
}

// Convert UTC ISO string to AWST (UTC+8)
function toAWST(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr.endsWith('Z') ? isoStr : isoStr + 'Z');
  return new Date(d.getTime() + 8 * 3600000).toISOString();
}
function awstDate(isoStr) { return toAWST(isoStr).slice(0, 10); }
function awstTime(isoStr) { return toAWST(isoStr).slice(11, 16); }
function awstDateTime(isoStr) { return toAWST(isoStr).slice(0, 16).replace('T', ' '); }

const tabOrder = ['search', 'recents', 'pipeline', 'library'];
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${tabOrder.indexOf(name) + 1})`).classList.add('active');
  document.getElementById(name + '-section').classList.add('active');
  if (name === 'pipeline') loadPipeline();
  if (name === 'recents') loadRecents();
  if (name === 'library') loadLibraryRecent();
}

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

document.getElementById('q').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) { document.getElementById('results').innerHTML = ''; return; }
  searchTimer = setTimeout(() => searchArtists(q), 300);
});

async function searchArtists(q) {
  const el = document.getElementById('results');
  el.innerHTML = '<div class="loading">Searching...</div>';
  try {
    const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    if (!data.artists || !data.artists.length) {
      el.innerHTML = '<div class="loading">No results</div>';
      return;
    }
    el.innerHTML = data.artists.map(a => `
      <div class="artist">
        <div class="artist-header" onclick="loadArtist('${a.id}', '${esc(a.name).replace(/'/g, "\\'")}', this.parentElement)">
          <span class="artist-name">${esc(a.name)}</span>
          ${a.disambiguation ? `<span class="artist-dis"> - ${esc(a.disambiguation)}</span>` : ''}
        </div>
        <div class="rg-list" id="rg-${a.id}"></div>
      </div>
    `).join('');
  } catch (e) { el.innerHTML = '<div class="loading">Search failed</div>'; }
}

async function loadArtist(id, artistName, el) {
  const rgEl = document.getElementById('rg-' + id);
  if (rgEl.innerHTML) { rgEl.innerHTML = ''; return; }
  rgEl.innerHTML = '<div class="loading">Loading discography...</div>';
  try {
    const [r, libR] = await Promise.all([
      fetch(`${API}/api/artist/${id}`),
      fetch(`${API}/api/library/artist?name=${encodeURIComponent(artistName)}&mbid=${id}`),
    ]);
    const data = await r.json();
    const libData = await libR.json();
    const groups = data.release_groups || [];
    const libraryAlbums = libData.albums || [];

    // Split: own work vs appearances, filter bootleg-only release groups
    // Compare by artist ID (handles name changes like Kanye West → Ye)
    const nameLC = artistName.toLowerCase();
    const own = [], appearances = [], bootlegOnly = [];
    for (const rg of groups) {
      const credit = (rg.artist_credit || '').toLowerCase();
      const isOwn = rg.primary_artist_id === id
        || credit === nameLC || credit.startsWith(nameLC + ' /') || credit.startsWith(nameLC + ',') || !credit;

      if (!rg.has_official) {
        bootlegOnly.push(rg);
      } else if (isOwn) {
        own.push(rg);
      } else {
        appearances.push(rg);
      }
    }

    function classify(rg) {
      const st = rg.secondary_types || [];
      if (st.includes('Compilation')) return 'Compilations';
      if (st.includes('Live')) return 'Live';
      if (st.includes('Remix')) return 'Remixes';
      if (st.includes('DJ-mix')) return 'DJ Mixes';
      if (st.includes('Demo')) return 'Demos';
      if (st.length > 0) return 'Other';
      if (rg.type === 'Album') return 'Albums';
      if (rg.type === 'EP') return 'EPs';
      if (rg.type === 'Single') return 'Singles';
      return 'Other';
    }

    function renderSection(rgs, defaultOpen) {
      const sectionOrder = ['Albums', 'EPs', 'Singles', 'Compilations', 'Live', 'Remixes', 'DJ Mixes', 'Demos', 'Other'];
      const sections = {};
      for (const rg of rgs) {
        const sec = classify(rg);
        if (!sections[sec]) sections[sec] = [];
        sections[sec].push(rg);
      }
      for (const sec of Object.values(sections)) {
        sec.sort((a, b) => (a.first_release_date || '').localeCompare(b.first_release_date || ''));
      }
      return sectionOrder
        .filter(s => sections[s])
        .map(s => {
          const items = sections[s];
          const isOpen = defaultOpen && s === 'Albums';
          return `
            <div class="type-section">
              <div class="type-header" onclick="event.stopPropagation(); this.nextElementSibling.classList.toggle('open')">
                ${s} <span class="type-count">${items.length}</span>
              </div>
              <div class="type-body${isOpen ? ' open' : ''}">
                ${items.map(rg => {
                  const year = rg.first_release_date ? rg.first_release_date.slice(0,4) : '';
                  const creditNote = rg.artist_credit && rg.artist_credit.toLowerCase() !== nameLC
                    ? `<span class="rg-meta"> - ${esc(rg.artist_credit)}</span>` : '';
                  return `
                    <div class="rg">
                      <div onclick="event.stopPropagation(); loadReleaseGroup('${rg.id}', this)">
                        <span class="rg-year">${year}</span> <span class="rg-title">${esc(rg.title)}</span>${creditNote}
                      </div>
                      <div class="releases" id="rel-${rg.id}"></div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `;
        }).join('');
    }

    // Library section — what you already own
    let html = '';
    if (libraryAlbums.length > 0) {
      const discogs = libraryAlbums.filter(a => a.source === 'discogs');
      const mb = libraryAlbums.filter(a => a.source === 'musicbrainz');
      html += `<div class="library-section">
        <div class="library-header">In Library (${libraryAlbums.length})</div>
        ${mb.map(a => `
          <div class="library-album">
            <span class="library-album-title">${a.year || '?'} ${esc(a.album)} (${a.track_count}t)</span>
            <span class="library-src library-src-mb">MB</span>
          </div>
        `).join('')}
        ${discogs.map(a => `
          <div class="library-album">
            <span class="library-album-title">${a.year || '?'} ${esc(a.album)} (${a.track_count}t)</span>
            <span class="library-src library-src-discogs">Discogs</span>
          </div>
        `).join('')}
      </div>`;
    }

    html += renderSection(own, true);
    if (appearances.length > 0) {
      html += `
        <div class="type-section">
          <div class="type-header" onclick="event.stopPropagation(); this.nextElementSibling.classList.toggle('open')" style="color:#777;">
            Appearances <span class="type-count">${appearances.length}</span>
          </div>
          <div class="type-body">

      html += `
        <div class="type-section">
          <div class="type-header" onclick="event.stopPropagation(); this.nextElementSibling.classList.toggle('open')" style="color:#555;">
            Bootleg-only releases <span class="type-count">${bootlegOnly.length}</span>
          </div>
          <div class="type-body">
            ${renderSection(bootlegOnly, false)}
          </div>
        </div>
      `;

  } catch (e) { rgEl.innerHTML = '<div class="loading">Failed to load</div>'; }
}

async function loadReleaseGroup(id, el) {
  const relEl = document.getElementById('rel-' + id);
  if (relEl.innerHTML) { relEl.innerHTML = ''; return; }
  relEl.innerHTML = '<div class="loading">Loading releases...</div>';
  try {
    const r = await fetch(`${API}/api/release-group/${id}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    const all = (data.releases || []).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    const official = all.filter(r => r.status === 'Official' || !r.status);
    const bootleg = all.filter(r => r.status && r.status !== 'Official');

    function renderRelease(rel) {
      let badges = '';
      if (rel.in_library) badges += '<span class="badge badge-library">in library</span>';
      if (rel.pipeline_status === 'wanted') badges += '<span class="badge badge-wanted">wanted</span>';
      if (rel.pipeline_status === 'imported') badges += '<span class="badge badge-imported">imported</span>';
      if (rel.pipeline_status === 'manual') badges += '<span class="badge badge-manual">manual</span>';
      const canAdd = !rel.in_library && !rel.pipeline_status;
      return `
        <div class="release" onclick="event.stopPropagation(); toggleReleaseDetail('${rel.id}')">
          <div class="release-info">
            <div class="release-title">${esc(rel.title)}${badges}</div>
            <div class="release-meta" style="color:#777;">${rel.country || '?'} ${rel.date || '?'} - ${rel.format} - ${rel.track_count}t - ${rel.status || '?'}</div>
          </div>
          <button class="btn btn-add" ${canAdd ? '' : 'disabled'} onclick="event.stopPropagation(); ${canAdd ? `addRelease('${rel.id}', this)` : ''}">
            ${canAdd ? 'Add' : (rel.in_library ? 'Owned' : rel.pipeline_status || '?')}
          </button>
        </div>
        <div class="release-detail" id="reldet-${rel.id}"></div>
      `;
    }

    let html = official.map(renderRelease).join('');
    if (bootleg.length > 0) {
      html += `
        <div class="type-header" onclick="event.stopPropagation(); this.nextElementSibling.classList.toggle('open')" style="color:#777;margin-top:6px;">
          Bootleg / Promo <span class="type-count">${bootleg.length}</span>
        </div>
        <div class="type-body">
          ${bootleg.map(renderRelease).join('')}
        </div>
      `;
    }
    relEl.innerHTML = html;
  } catch (e) { relEl.innerHTML = '<div class="loading">Failed to load</div>'; }
}

async function addRelease(mbid, btn) {
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const r = await fetch(`${API}/api/pipeline/add`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({mb_release_id: mbid}),
    });
    const data = await r.json();
    if (data.status === 'added') {
      btn.textContent = 'Added';
      toast(`Added: ${data.artist} - ${data.album} (${data.tracks} tracks)`);
    } else if (data.status === 'exists') {
      btn.textContent = data.current_status;
      toast(`Already in pipeline (${data.current_status})`);
    } else {
      btn.textContent = 'Error';
      toast(data.error || 'Unknown error', true);
    }
  } catch (e) {
    btn.textContent = 'Error';
    toast('Request failed', true);
  }
}

async function toggleReleaseDetail(mbid) {
  const el = document.getElementById('reldet-' + mbid);
  if (el.classList.contains('open')) { el.classList.remove('open'); return; }
  el.innerHTML = '<div class="loading" style="padding:8px;">Loading...</div>';
  el.classList.add('open');
  try {
    const r = await fetch(`${API}/api/release/${mbid}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    let html = '';

    // Use beets tracks if owned (has bitrate info), otherwise MB tracks
    const hasBeets = data.beets_tracks && data.beets_tracks.length > 0;
    const tracks = hasBeets ? data.beets_tracks : (data.tracks || []);

    if (tracks.length > 0) {
      html += '<div style="margin-bottom:6px;color:#666;font-size:0.8em;">Tracks (' + tracks.length + ')' + (hasBeets ? ' — from library' : '') + '</div>';
      html += tracks.map(t => {
        if (hasBeets) {
          const dur = t.length ? `${Math.floor(t.length/60)}:${String(Math.round(t.length%60)).padStart(2,'0')}` : '';
          const br = t.bitrate ? `${Math.round(t.bitrate/1000)}kbps` : '';
          const depth = t.bitdepth && t.bitdepth > 16 ? `${t.bitdepth}bit` : '';
          const sr = t.samplerate && t.samplerate > 44100 ? `${(t.samplerate/1000).toFixed(1)}kHz` : '';
          const meta = [t.format, br, depth, sr].filter(Boolean).join(' ');
          return `<div class="lib-track">
            <span>${t.disc > 1 ? t.disc + '.' : ''}${t.track}. ${esc(t.title)} ${dur ? '<span style="color:#555;">' + dur + '</span>' : ''}</span>
            <span class="lib-track-meta">${meta}</span>
          </div>`;
        } else {
          const dur = t.length_seconds ? `${Math.floor(t.length_seconds/60)}:${String(Math.round(t.length_seconds%60)).padStart(2,'0')}` : '';
          return `<div class="lib-track">
            <span>${t.disc_number > 1 ? t.disc_number + '.' : ''}${t.track_number}. ${esc(t.title)} ${dur ? '<span style="color:#555;">' + dur + '</span>' : ''}</span>
          </div>`;
        }
      }).join('');
    }

    // Links and actions
    html += '<div class="release-links">';
    html += `<a href="https://musicbrainz.org/release/${mbid}" target="_blank" rel="noopener" style="color:#6af;font-size:0.85em;" onclick="event.stopPropagation()">MusicBrainz</a>`;
    const canAdd = !data.in_library && !data.pipeline_status;
    if (canAdd) {
      html += `<button class="btn btn-add" onclick="event.stopPropagation(); addRelease('${mbid}', this)">Add to pipeline</button>`;
    }
    html += '</div>';

    el.innerHTML = html;
  } catch (e) { el.innerHTML = '<div class="loading" style="padding:8px;">Failed to load</div>'; }
}

async function loadRecents() {
  const el = document.getElementById('recents-content');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const r = await fetch(`${API}/api/pipeline/log`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const items = data.log || [];
    if (items.length === 0) {
      el.innerHTML = '<div class="loading">No pipeline activity</div>';
      return;
    }

    // Group by date (AWST)
    const byDate = {};
    for (const item of items) {
      const date = awstDate(item.created_at || '');
      if (!byDate[date]) byDate[date] = [];
      byDate[date].push(item);
    }
    const dates = Object.keys(byDate).sort().reverse();

    el.innerHTML = dates.map(date => `
      <div class="r-date-header">${date}</div>
      ${byDate[date].map(item => {
        const time = awstTime(item.created_at || '');
        const user = item.soulseek_username || '';
        const isRejected = item.outcome === 'rejected';
        const isSuccess = item.outcome === 'success';
        const scenario = item.beets_scenario || '';
        const wasConverted = item.was_converted;
        const prevBr = item.prev_min_bitrate;
        const curBr = item.request_min_bitrate;

        // Classify the event
        let badge = '', badgeClass = '', borderColor = '#444';
        if (isRejected) {
          const reasons = {
            'high_distance': 'Wrong match',
            'audio_corrupt': 'Corrupt audio',
            'no_candidates': 'No MB match',
            'quality_downgrade': 'Quality downgrade',
            'album_name_mismatch': 'Name mismatch',
          };
          badge = reasons[scenario] || 'Rejected';
          badgeClass = 'badge-rejected';
          borderColor = '#a33';
        } else if (isSuccess && prevBr && curBr && curBr > prevBr) {
          badge = 'Upgraded';
          badgeClass = 'badge-upgraded';
          borderColor = '#3a6';
        } else if (isSuccess && wasConverted && item.bitrate && item.bitrate < 210000) {
          const accepted = item.request_status === 'imported';
          badge = accepted ? 'Transcode - accepted' : 'Transcode';
          badgeClass = accepted ? 'badge-new' : 'badge-transcode';
          borderColor = accepted ? '#1a4a2a' : '#a93';
        } else if (isSuccess) {
          if (prevBr && curBr && curBr <= prevBr) {
            // Nominal bitrate went down — but if this was a quality_override
            // upgrade (replacing garbage CBR 320 with genuine V0), it's still
            // an upgrade. The old files were upsampled junk.
            if (item.quality_override) {
              badge = 'Upgraded';
              badgeClass = 'badge-upgraded';
              borderColor = '#3a6';
            } else {
              const accepted = item.request_status === 'imported';
              badge = accepted ? 'Quality mismatch - accepted' : 'Beets quality mismatch';
              badgeClass = accepted ? 'badge-new' : 'badge-transcode';
              borderColor = accepted ? '#1a4a2a' : '#a93';
            }
          } else {
            badge = prevBr ? 'Upgraded' : 'New import';
            badgeClass = 'badge-new';
            borderColor = '#1a4a2a';
          }
        }

        // Quality display
        let qualityInfo = '';
        if (isSuccess) {
          const fmt = item.beets_format || item.filetype || '';
          // Use DB min_bitrate (avg after accept) if set, else beets min
          const br = (curBr ? curBr * 1000 : null) || item.beets_bitrate || item.bitrate || 0;
          qualityInfo = qualityLabel(fmt, br);
          if (wasConverted) qualityInfo += ' (from flac)';
          // Upgrade delta
          if (prevBr && curBr && prevBr !== curBr) {
            const prevL = qualityLabel('MP3', prevBr * 1000);
            const curL = qualityLabel('MP3', curBr * 1000);
            const prevS = prevL !== curL ? prevL : `${prevBr}k`;
            const curS = prevL !== curL ? curL : `${curBr}k`;
            if (curBr > prevBr) {
              qualityInfo += ` <span style="color:#6d6;">↑${prevS}→${curS}</span>`;
            } else {
              qualityInfo += ` <span style="color:#d66;">↓${prevS}→${curS}</span>`;
            }
          }
        } else {
          const dist = item.beets_distance != null ? `dist ${parseFloat(item.beets_distance).toFixed(3)}` : '';
          qualityInfo = dist;
        }

        return `
          <div class="r-item" style="border-left-color:${borderColor}" onclick="toggleDetail(${item.request_id})">
            <div class="p-top">
              <div>
                <div class="p-title">${esc(item.album_title)} <span class="badge ${badgeClass}">${badge}</span></div>
                <div class="p-artist">${esc(item.artist_name)}</div>
              </div>
              <div style="font-size:0.75em;color:#666;">${time}</div>
            </div>
            <div class="p-meta">
              ${qualityInfo ? `<span>${qualityInfo}</span>` : ''}
              ${user ? `<span>from ${esc(user)}</span>` : ''}
              ${isRejected && item.beets_detail ? `<span style="color:#888;">${esc(item.beets_detail)}</span>` : ''}
            </div>
          </div>
          <div class="p-detail" id="detail-${item.request_id}"></div>
        `;
      }).join('')}
    `).join('');
  } catch (e) { el.innerHTML = '<div class="loading">Failed to load log</div>'; }
}

let pipelineData = null;
let pipelineFilter = 'wanted';

async function loadPipeline() {
  const el = document.getElementById('pipeline-content');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const r = await fetch(`${API}/api/pipeline/all`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    pipelineData = await r.json();
    renderPipeline();
  } catch (e) { el.innerHTML = '<div class="loading">Failed to load pipeline</div>'; }
}

function setFilter(f) {
  pipelineFilter = f;
  renderPipeline();
}

function renderPipeline() {
  const el = document.getElementById('pipeline-content');
  const data = pipelineData;
  if (!data) return;
  const counts = data.counts || {};
  const total = Object.values(counts).reduce((a, b) => a + b, 0);

  let items = [];
  if (pipelineFilter === 'all') {
    items = [...(data.wanted || []), ...(data.imported || []), ...(data.manual || [])];
  } else {
    items = data[pipelineFilter] || [];
  }

  // Group by artist
  const byArtist = {};
  for (const item of items) {
    const artist = item.artist_name || 'Unknown';
    if (!byArtist[artist]) byArtist[artist] = [];
    byArtist[artist].push(item);
  }
  // Sort artists alphabetically, albums by year within each
  const artists = Object.keys(byArtist).sort((a, b) => a.localeCompare(b));
  for (const a of artists) {
    byArtist[a].sort((x, y) => (x.year || 0) - (y.year || 0));
  }

  el.innerHTML = `
    <div class="status-card">
      <div class="status-counts">
        <div class="count ${pipelineFilter === 'wanted' ? 'active' : ''}" onclick="setFilter('wanted')">
          <div class="count-num">${counts.wanted || 0}</div><div class="count-label">Wanted</div>
        </div>
        <div class="count ${pipelineFilter === 'manual' ? 'active' : ''}" onclick="setFilter('manual')">
          <div class="count-num">${counts.manual || 0}</div><div class="count-label">Manual</div>
        </div>
        <div class="count ${pipelineFilter === 'imported' ? 'active' : ''}" onclick="setFilter('imported')">
          <div class="count-num">${counts.imported || 0}</div><div class="count-label">Imported</div>
        </div>
        <div class="count ${pipelineFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">
          <div class="count-num">${total}</div><div class="count-label">All</div>
        </div>
      </div>
    </div>
    ${artists.map(artist => `
      <div class="p-group-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
        ${esc(artist)} <span style="color:#555;font-weight:400;">${byArtist[artist].length}</span>
      </div>
      <div class="p-group-body">
        ${byArtist[artist].map(item => renderPipelineItem(item)).join('')}
      </div>
    `).join('')}
    ${artists.length === 0 ? '<div class="loading">No items</div>' : ''}
  `;
}

function renderPipelineItem(item) {
  const statusBadge = item.status === 'wanted' ? '<span class="badge badge-wanted">wanted</span>'
    : item.status === 'imported' ? '<span class="badge badge-imported">imported</span>'
    : '<span class="badge badge-manual">manual</span>';
  const srcClass = 'src-' + (item.source || 'request');
  const year = item.year || '?';
  const fmt = item.format || '?';
  const country = item.country || '';
  const date = awstDate(item.created_at || '');
  const attempts = [];
  if (item.search_attempts) attempts.push(`${item.search_attempts} search`);
  if (item.download_attempts) attempts.push(`${item.download_attempts} dl`);
  if (item.validation_attempts) attempts.push(`${item.validation_attempts} val`);
  const attemptStr = attempts.length ? attempts.join(', ') : '';
  const dist = item.beets_distance != null ? `dist ${item.beets_distance.toFixed(3)}` : '';

  return `
    <div class="p-item ${srcClass}" onclick="toggleDetail(${item.id})">
      <div class="p-top">
        <div>
          <div class="p-title">${esc(item.album_title)}${statusBadge}</div>
        </div>
        <div style="font-size:0.75em;color:#666;">#${item.id}</div>
      </div>
      <div class="p-meta">
        <span>${year}</span>
        <span>${fmt}</span>
        ${country ? `<span>${country}</span>` : ''}
        <span>${item.source}</span>
        <span>${date}</span>
        ${attemptStr ? `<span>${attemptStr}</span>` : ''}
        ${dist ? `<span>${dist}</span>` : ''}
      </div>
    </div>
    <div class="p-detail" id="detail-${item.id}"></div>
  `;
}

async function toggleDetail(id) {
  const el = document.getElementById('detail-' + id);
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    return;
  }
  el.innerHTML = '<div class="loading" style="padding:8px;">Loading...</div>';
  el.classList.add('open');
  try {
    const r = await fetch(`${API}/api/pipeline/${id}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const req = data.request;
    const tracks = data.tracks || [];
    const history = data.history || [];

    let html = '';
    // Reasoning
    if (req.reasoning) {
      html += `<div class="p-detail-row"><span class="p-detail-label">Reasoning</span><span class="p-detail-value">${esc(req.reasoning)}</span></div>`;
    }
    // MB link
    if (req.mb_release_id) {
      html += `<div class="p-detail-row"><span class="p-detail-label">MusicBrainz</span><span class="p-detail-value"><a href="https://musicbrainz.org/release/${req.mb_release_id}" target="_blank" rel="noopener" style="color:#6af;">${req.mb_release_id.slice(0,8)}...</a></span></div>`;
    }
    if (req.imported_path) {
      html += `<div class="p-detail-row"><span class="p-detail-label">Imported to</span><span class="p-detail-value" style="font-size:0.9em;">${esc(req.imported_path)}</span></div>`;
    }
    // beets_scenario on album_requests is from the last successful import,
    // not necessarily this download — per-download scenarios are shown in
    // the download history section below instead

    // Tracks — prefer beets (has bitrate) over pipeline tracks
    const beetsTracks = data.beets_tracks || [];
    if (beetsTracks.length > 0) {
      html += '<div class="p-tracks"><div class="p-detail-label" style="margin-bottom:4px;">Tracks (' + beetsTracks.length + ')</div>';
      html += beetsTracks.map(t => {
        const dur = t.length ? `${Math.floor(t.length/60)}:${String(Math.round(t.length%60)).padStart(2,'0')}` : '';
        const br = t.bitrate ? `${Math.round(t.bitrate/1000)}kbps` : '';
        const depth = t.bitdepth && t.bitdepth > 16 ? `${t.bitdepth}bit` : '';
        const sr = t.samplerate && t.samplerate > 44100 ? `${(t.samplerate/1000).toFixed(1)}kHz` : '';
        const meta = [t.format, br, depth, sr].filter(Boolean).join(' ');
        return `<div class="lib-track">
          <span>${t.disc > 1 ? t.disc + '.' : ''}${t.track}. ${esc(t.title)} ${dur ? '<span style="color:#555;">' + dur + '</span>' : ''}</span>
          <span class="lib-track-meta">${meta}</span>
        </div>`;
      }).join('');
      html += '</div>';
    } else if (tracks.length > 0) {
      html += '<div class="p-tracks"><div class="p-detail-label" style="margin-bottom:4px;">Tracks (' + tracks.length + ')</div>';
      html += tracks.map(t => {
        const dur = t.length_seconds ? `${Math.floor(t.length_seconds/60)}:${String(Math.round(t.length_seconds%60)).padStart(2,'0')}` : '';
        return `<div class="p-track">${t.disc_number > 1 ? t.disc_number + '.' : ''}${t.track_number}. ${esc(t.title)} ${dur ? '<span style="color:#555;">' + dur + '</span>' : ''}</div>`;
      }).join('');
      html += '</div>';
    }

    // Download history
    if (history.length > 0) {
      html += '<div class="p-history"><div class="p-detail-label" style="margin-bottom:4px;">Download History (' + history.length + ')</div>';
      html += history.map(renderDownloadHistoryItem).join('');
      html += '</div>';
    }

    // Status change buttons
    const mbid = req.mb_release_id || '';
    html += `<div class="p-actions">
      <span class="p-detail-label" style="line-height:28px;">Status:</span>
      <button class="p-btn ${req.status === 'wanted' ? 'active-status' : ''}" onclick="event.stopPropagation(); updateStatus(${id}, 'wanted')">wanted</button>
      <button class="p-btn ${req.status === 'imported' ? 'active-status' : ''}" onclick="event.stopPropagation(); updateStatus(${id}, 'imported')">imported</button>
      <button class="p-btn ${req.status === 'manual' ? 'active-status' : ''}" onclick="event.stopPropagation(); updateStatus(${id}, 'manual')">manual</button>
      <button class="p-btn delete" onclick="event.stopPropagation(); deleteRequest(${id})">delete</button>
    </div>`;
    // Min bitrate + Accept
    if (mbid) {
      html += `<div class="p-actions">
        <span class="p-detail-label" style="line-height:28px;">Min bitrate:</span>
        <input type="number" id="det-minbr-${id}" value="" placeholder="${req.min_bitrate || ''}" style="width:60px;padding:2px 6px;background:#222;color:#eee;border:1px solid #444;border-radius:4px;font-size:0.8em;" onclick="event.stopPropagation()">
        <button class="p-btn" onclick="event.stopPropagation(); var v=document.getElementById('det-minbr-${id}').value; if(v) setLibQuality('${mbid}', null, parseInt(v), ${id})">Set</button>
        <button class="p-btn" onclick="event.stopPropagation(); setLibQuality('${mbid}', 'imported', null, ${id})">Accept</button>
      </div>`;
    }
    // Ban source buttons (one per user in history)
    const usersToBan = [...new Set(history.filter(h => h.soulseek_username).map(h => h.soulseek_username))];
    if (usersToBan.length > 0 && mbid) {
      html += '<div class="p-actions">';
      html += usersToBan.map(u =>
        `<button class="p-btn delete" onclick="event.stopPropagation(); banSource(${id}, '${u.replace(/'/g, "\\'")}', '${mbid}')">Ban ${esc(u)}</button>`
      ).join('');
      html += '</div>';
    }

    el.innerHTML = html;
  } catch (e) { el.innerHTML = '<div class="loading" style="padding:8px;">Failed to load details</div>'; }
}

async function deleteRequest(id) {
  if (!confirm(`Delete pipeline request #${id}?`)) return;
  try {
    const r = await fetch(`${API}/api/pipeline/delete`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id}),
    });
    const data = await r.json();
    if (data.status === 'ok') {
      toast(`Deleted #${id}`);
      loadPipeline();
    } else {
      toast(data.error || 'Delete failed', true);
    }
  } catch (e) { toast('Delete failed', true); }
}

async function updateStatus(id, newStatus) {
  try {
    const r = await fetch(`${API}/api/pipeline/update`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id, status: newStatus}),
    });
    const data = await r.json();
    if (data.status === 'ok') {
      toast(`#${id} → ${newStatus}`);
      loadPipeline();
    } else {
      toast(data.error || 'Update failed', true);
    }
  } catch (e) { toast('Update failed', true); }
}

let libSearchTimer = null;
document.addEventListener('DOMContentLoaded', () => {
  const libQ = document.getElementById('lib-q');
  if (libQ) libQ.addEventListener('input', e => {
    clearTimeout(libSearchTimer);
    const q = e.target.value.trim();
    if (q.length < 2) { document.getElementById('library-content').innerHTML = ''; return; }
    libSearchTimer = setTimeout(() => searchLibrary(q), 300);
  });
});

function loadLibraryRecent() {
  const el = document.getElementById('library-content');
  const q = document.getElementById('lib-q').value.trim();
  if (q.length >= 2) return; // user has a search active
  el.innerHTML = '<div class="loading">Loading recent additions...</div>';
  fetch(`${API}/api/beets/recent`).then(r => r.json()).then(data => {
    renderLibraryResults(data.albums || []);
  }).catch(() => { el.innerHTML = '<div class="loading">Failed to load</div>'; });
}

async function searchLibrary(q) {
  const el = document.getElementById('library-content');
  el.innerHTML = '<div class="loading">Searching...</div>';
  try {
    const r = await fetch(`${API}/api/beets/search?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    renderLibraryResults(data.albums || []);
  } catch (e) { el.innerHTML = '<div class="loading">Search failed</div>'; }
}

function renderLibraryResults(albums) {
  const el = document.getElementById('library-content');
  if (albums.length === 0) {
    el.innerHTML = '<div class="loading">No results</div>';
    return;
  }
  // Group by artist
  const byArtist = {};
  for (const a of albums) {
    const artist = a.artist || 'Unknown';
    if (!byArtist[artist]) byArtist[artist] = [];
    byArtist[artist].push(a);
  }
  const artists = Object.keys(byArtist).sort((a, b) => a.localeCompare(b));
  // Sort albums within each artist by year
  for (const a of artists) {
    byArtist[a].sort((x, y) => (x.year || 0) - (y.year || 0));
  }

  // Auto-expand if only one artist
  const autoOpen = artists.length === 1;

  el.innerHTML = artists.map(artist => {
    const artistAlbums = byArtist[artist];

    // Group by release group within artist
    const rgOrder = [];
    const byRG = {};
    for (const a of artistAlbums) {
      const rgKey = a.mb_releasegroupid || ('_' + a.id);
      if (!byRG[rgKey]) {
        byRG[rgKey] = { title: a.release_group_title || a.album, year: a.year, albums: [] };
        rgOrder.push(rgKey);
      }
      byRG[rgKey].albums.push(a);
    }
    const rgCount = rgOrder.length;

    function renderAlbum(a) {
      const added = a.added ? new Date(a.added * 1000 + 8 * 3600000).toISOString().slice(0, 10) : '?';
      const mbid = a.mb_albumid || '';
      return `
        <div class="lib-item" onclick="toggleLibDetail(${a.id})">
          <div class="p-top">
            <div>
              <div class="p-title">${esc(a.album)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
              ${mbid ? (a.upgrade_queued
                ? `<button class="p-btn upgrade-btn" style="padding:2px 8px;font-size:0.7em;border-color:#6a9;color:#6a9;" disabled>Queued</button>`
                : `<button class="p-btn upgrade-btn" style="padding:2px 8px;font-size:0.7em;" onclick="event.stopPropagation(); upgradeAlbum('${mbid}', this)">Upgrade</button>`
              ) : ''}
              <span style="font-size:0.75em;color:#666;">${a.track_count}t</span>
            </div>
          </div>
          <div class="p-meta">
            <span>${a.year || '?'}</span>
            <span>${qualityLabel(a.formats, a.min_bitrate)}</span>
            ${a.country ? `<span>${a.country}</span>` : ''}
            ${a.type ? `<span>${a.type}</span>` : ''}
            <span>added ${added}</span>
          </div>
        </div>
        <div class="lib-detail" id="lib-${a.id}"></div>
      `;
    }

    const albumsHtml = rgOrder.map(rgKey => {
      const rg = byRG[rgKey];
      if (rg.albums.length === 1) {
        return renderAlbum(rg.albums[0]);
      }
      // Multiple releases in same release group
      const yr = rg.year || '?';
      return `
        <div class="lib-rg">
          <div class="lib-rg-header" onclick="this.nextElementSibling.classList.toggle('open')">
            <span>${yr} ${esc(rg.title)}</span>
            <span class="lib-artist-count">${rg.albums.length} versions</span>
          </div>
          <div class="lib-rg-body">
            ${rg.albums.map(renderAlbum).join('')}
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="lib-artist">
        <div class="lib-artist-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <span class="lib-artist-name">${esc(artist)}</span>
          <span class="lib-artist-count">${rgCount} release${rgCount !== 1 ? 's' : ''}</span>
        </div>
        <div class="lib-artist-body${autoOpen ? ' open' : ''}">
          ${albumsHtml}
        </div>
      </div>
    `;
  }).join('');
}

async function toggleLibDetail(id) {
  const el = document.getElementById('lib-' + id);
  if (el.classList.contains('open')) { el.classList.remove('open'); return; }
  el.innerHTML = '<div class="loading" style="padding:8px;">Loading...</div>';
  el.classList.add('open');
  try {
    const r = await fetch(`${API}/api/beets/album/${id}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    let html = '';
    if (data.path) {
      html += `<div class="p-detail-row"><span class="p-detail-label">Path</span><span class="p-detail-value" style="font-size:0.85em;word-break:break-all;">${esc(data.path)}</span></div>`;
    }
    if (data.mb_albumid) {
      html += `<div class="p-detail-row"><span class="p-detail-label">MusicBrainz</span><span class="p-detail-value"><a href="https://musicbrainz.org/release/${data.mb_albumid}" target="_blank" rel="noopener" style="color:#6af;">${data.mb_albumid.slice(0,8)}...</a></span></div>`;
    }
    if (data.label) {
      html += `<div class="p-detail-row"><span class="p-detail-label">Label</span><span class="p-detail-value">${esc(data.label)}</span></div>`;
    }
    // Tracks
    if (data.tracks && data.tracks.length > 0) {
      html += '<div class="p-tracks"><div class="p-detail-label" style="margin-bottom:4px;">Tracks (' + data.tracks.length + ')</div>';
      html += data.tracks.map(t => {
        const dur = t.length ? `${Math.floor(t.length/60)}:${String(Math.round(t.length%60)).padStart(2,'0')}` : '';
        const br = t.bitrate ? `${Math.round(t.bitrate/1000)}kbps` : '';
        const depth = t.bitdepth && t.bitdepth > 16 ? `${t.bitdepth}bit` : '';
        const sr = t.samplerate && t.samplerate > 44100 ? `${(t.samplerate/1000).toFixed(1)}kHz` : '';
        const meta = [t.format, br, depth, sr].filter(Boolean).join(' ');
        return `<div class="lib-track">
          <span>${t.disc > 1 ? t.disc + '.' : ''}${t.track}. ${esc(t.title)} ${dur ? '<span style="color:#555;">' + dur + '</span>' : ''}</span>
          <span class="lib-track-meta">${meta}</span>
        </div>`;
      }).join('');
      html += '</div>';
    }
    // Pipeline download history
    const history = data.download_history || [];
    if (history.length > 0) {
      html += '<div class="p-history"><div class="p-detail-label" style="margin-bottom:4px;">Download History (' + history.length + ')</div>';
      html += history.map(renderDownloadHistoryItem).join('');
      html += '</div>';
    } else if (data.pipeline_status) {
      html += `<div class="p-detail-row"><span class="p-detail-label">Pipeline</span><span class="p-detail-value">${data.pipeline_status} (${data.pipeline_source || '?'})</span></div>`;
    }
    // Pipeline controls (status + quality override)
    if (data.mb_albumid && data.pipeline_id) {
      const pStatus = data.pipeline_status || '';
      html += `<div class="p-actions" style="margin-top:10px;">
        <span class="p-detail-label" style="line-height:28px;">Status:</span>
        <button class="p-btn ${pStatus === 'wanted' ? 'active-status' : ''}" onclick="event.stopPropagation(); setLibQuality('${data.mb_albumid}', 'wanted', null)">wanted</button>
        <button class="p-btn ${pStatus === 'imported' ? 'active-status' : ''}" onclick="event.stopPropagation(); setLibQuality('${data.mb_albumid}', 'imported', null)">imported</button>
        <button class="p-btn ${pStatus === 'manual' ? 'active-status' : ''}" onclick="event.stopPropagation(); setLibQuality('${data.mb_albumid}', 'manual', null)">manual</button>
      </div>`;
      html += `<div class="p-actions" style="margin-top:6px;">
        <span class="p-detail-label" style="line-height:28px;">Min bitrate:</span>
        <input type="number" id="lib-minbr-${id}" value="" placeholder="${data.pipeline_min_bitrate || ''}" style="width:60px;padding:2px 6px;background:#222;color:#eee;border:1px solid #444;border-radius:4px;font-size:0.8em;" onclick="event.stopPropagation()">
        <button class="p-btn" onclick="event.stopPropagation(); var v=document.getElementById('lib-minbr-${id}').value; if(v) setLibQuality('${data.mb_albumid}', null, parseInt(v))">Set</button>
        <button class="p-btn" onclick="event.stopPropagation(); setLibQuality('${data.mb_albumid}', 'imported', null)">Accept</button>
      </div>`;
    }
    // Upgrade + Delete buttons
    html += '<div class="p-actions" style="margin-top:6px;">';
    if (data.mb_albumid) {
      const bitrates = (data.tracks || []).map(t => t.bitrate).filter(b => b && b > 0);
      const minBr = bitrates.length > 0 ? Math.round(Math.min(...bitrates) / 1000) : null;
      const brLabel = minBr ? ` (lowest: ${minBr}kbps)` : '';
      if (!data.upgrade_queued) {
        html += `<button class="p-btn upgrade-btn" onclick="event.stopPropagation(); upgradeAlbum('${data.mb_albumid}', this)">Upgrade${brLabel}</button>`;
      }
    }
    html += `<button class="p-btn delete-beets" onclick="event.stopPropagation(); confirmDeleteBeets(${id}, '${esc(data.artist).replace(/'/g, "\\'")}', '${esc(data.album).replace(/'/g, "\\'")}', ${data.tracks ? data.tracks.length : 0})">Delete from beets</button>`;
    html += '</div>';
    el.innerHTML = html;
  } catch (e) { el.innerHTML = '<div class="loading" style="padding:8px;">Failed to load</div>'; }
}

async function banSource(requestId, username, mbid) {
  if (!confirm(`Ban ${username} for this album?\nThis will remove files from beets and requeue for re-download.`)) return;
  try {
    const r = await fetch(`${API}/api/pipeline/ban-source`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({request_id: requestId, username, mb_release_id: mbid}),
    });
    const data = await r.json();
    if (data.status === 'ok') {
      toast(`Banned ${username}, ${data.beets_removed ? 'removed from beets' : 'not in beets'}, requeued`);
    } else {
      toast(data.error || 'Ban failed', true);
    }
  } catch (e) { toast('Ban failed', true); }
}

async function setLibQuality(mbid, status, minBitrate, detailId) {
  try {
    const body = {mb_release_id: mbid};
    if (status) body.status = status;
    if (minBitrate != null) body.min_bitrate = minBitrate;
    const r = await fetch(`${API}/api/pipeline/set-quality`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (data.status === 'ok') {
      const parts = [];
      if (status) parts.push(status);
      if (minBitrate != null) parts.push(`min_bitrate=${minBitrate}`);
      toast(`Set ${parts.join(', ')}`);
      // Refresh the whole recents/library view to update badges
      const activeTab = document.querySelector('.tab.active');
      if (activeTab) {
        const tabText = activeTab.textContent.trim();
        if (tabText === 'Recents') loadRecents();
        else if (tabText === 'Library') loadLibraryRecent();
      }
    } else {
      toast(data.error || 'Failed', true);
    }
  } catch (e) { toast('Failed', true); }
}

async function upgradeAlbum(mbid, btn) {
  btn.disabled = true;
  btn.textContent = 'Queuing...';
  try {
    const r = await fetch(`${API}/api/pipeline/upgrade`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({mb_release_id: mbid}),
    });
    const data = await r.json();
    if (data.status === 'upgrade_queued') {
      btn.textContent = 'Queued';
      btn.style.borderColor = '#6a9';
      btn.style.color = '#6a9';
      const br = data.min_bitrate ? ` from ${data.min_bitrate}kbps` : '';
      toast(`Upgrade queued${br} — searching flac, v0, 320`);
    } else {
      btn.textContent = 'Error';
      toast(data.error || 'Upgrade failed', true);
    }
  } catch (e) {
    btn.textContent = 'Error';
    toast('Upgrade failed', true);
  }
}

function confirmDeleteBeets(id, artist, album, trackCount) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>Delete from beets?</h3>
      <p>${artist} - ${album}<br>${trackCount} tracks will be permanently deleted from disk.</p>
      <div class="actions">
        <button class="p-btn" onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
        <button class="p-btn delete-beets" id="confirm-delete-btn" onclick="executeBeetsDeletion(${id}, this)">Yes, delete permanently</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

async function executeBeetsDeletion(id, btn) {
  btn.disabled = true;
  btn.textContent = 'Deleting...';
  try {
    const r = await fetch(`${API}/api/beets/delete`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id, confirm: 'DELETE'}),
    });
    const data = await r.json();
    document.querySelector('.confirm-overlay')?.remove();
    if (data.status === 'ok') {
      toast(`Deleted: ${data.artist} - ${data.album} (${data.deleted_files} files)`);
      // Remove the item from the DOM
      const detail = document.getElementById('lib-' + id);
      if (detail) { detail.previousElementSibling?.remove(); detail.remove(); }
    } else {
      toast(data.error || 'Delete failed', true);
    }
  } catch (e) {
    document.querySelector('.confirm-overlay')?.remove();
    toast('Delete failed', true);
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
